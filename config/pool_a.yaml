# A 股 ETF + 跨资产代表 监控池
#
# 字段：
#   code:      交易所前缀 + 代码（SH510050 / SZ159995）
#   name:      中文显示名
#   category:  分类（用于报告分组；与 classify.py 的四象限归类无关）
#   role:      可选；跨资产代表标注（treasury_10y / treasury_30y / gold / oil）
#              用于 cross_asset_state 派生。普通板块 ETF 不填。
#
# 编辑约定：
#   - 改动这个文件后，运行 `python a/etf_update.py` 自动补齐切片
#   - 不要重复造代码格式（必须 SH/SZ 大写前缀 + 6 位数字）
#   - 顺序无关，category 内部顺序由 Python 排序

etfs:
  # === 跨资产代表（先列，方便 cross_asset 引用）===
  - { code: SH511260, name: 十年国债ETF,        category: 利率债, role: treasury_10y }
  - { code: SH511090, name: 30年国债ETF,        category: 利率债, role: treasury_30y }
  - { code: SH518880, name: 黄金ETF,            category: 贵金属, role: gold }
  - { code: SH501018, name: 南方原油LOF,        category: 原油,   role: oil }

  # === 宽基指数 ===
  - { code: SH510050, name: 上证50ETF,          category: 宽基 }
  - { code: SH510210, name: 上证指数ETF,        category: 宽基 }
  - { code: SZ159845, name: 中证1000ETF,        category: 宽基 }
  - { code: SZ159949, name: 创业板50ETF,        category: 宽基 }
  - { code: SZ159920, name: 恒生ETF,            category: 海外宽基 }
  - { code: SH513300, name: 纳斯达克ETF,        category: 海外宽基 }

  # === 利率债（已在跨资产列出，这里只列地方债）===
  - { code: SH511270, name: 10年地方债ETF,      category: 利率债 }

  # === 科技 / 进攻 ===
  - { code: SZ159995, name: 芯片ETF,            category: 科技 }
