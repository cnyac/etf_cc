  - { code: IWM,    name: 罗素2000指数ETF,         category: 宽基 }
  - { code: RSP,    name: 标普500等权指数ETF,      category: 宽基 }
  - { code: XLE,    name: 能源精选行业指数ETF,     category: 能源 }

  # === 科技 / 半导体 ===
