# 美股池监控池（用户给定 44 只 + 补 IEF 用作 treasury_10y 代表 = 45 只）
#
# 字段：
#   code:      美股 ticker（直接用，如 SPY / TSLA / BRK.B）
#   name:      中文/英文显示名
#   category:  分类（用于报告分组；与 classify.py 的四象限归类无关）
#   role:      可选；跨资产代表标注。8 个允许值：
#              treasury_10y / treasury_30y / dollar / gold / oil / vix / btc / eth
#              填写后参与 panel.cross_asset_state 派生
#
# 注：treasury_30y 用户未给（TLT 等）。当前 cross_asset_state.treasury_30y 将为 None；
#     若需补，在 GUI 池配置 tab 增一行：code=TLT, name=20年期国债ETF, role=treasury_30y

etfs:
  # === 跨资产代表（先列，方便引用）===
  - { code: IEF,    name: 7-10年期国债ETF,         category: 利率债,   role: treasury_10y }
  - { code: UUP,    name: 美元做多货币投资组合,    category: 外汇,     role: dollar }
  - { code: GLD,    name: 黄金ETF,                 category: 贵金属,   role: gold }
  - { code: USO,    name: 轻质低硫原油,            category: 原油,     role: oil }
  - { code: VIXY,   name: 短期VIX期货ETF,          category: 波动率,   role: vix }
  - { code: IBIT,   name: iShares Bitcoin Trust,   category: 加密,     role: btc }
  - { code: ETHA,   name: 以太币-美元参考利率,     category: 加密,     role: eth }

  # === 宽基指数 ETF ===
